name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint e formatação
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  api-tests:
    name: Testes de API
    runs-on: ubuntu-latest
    needs: lint
    # Backend local via service container: os testes de API deixam de depender
    # da disponibilidade da instância pública (serverest.dev), que é compartilhada
    # e sofre quedas (503) periódicas.
    services:
      serverest:
        image: paulogoncalvesbh/serverest:latest
        ports:
          - 3000:3000
    steps:
      - uses: actions/checkout@v4
      - name: Aguardar backend local ficar disponível
        run: npx --yes wait-on http://localhost:3000/usuarios --timeout 60000
      - name: Executar testes de API (backend local)
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/api/**/*.cy.js
        env:
          CYPRESS_apiUrl: http://localhost:3000
      - name: Gerar evidência em PDF do relatório
        if: always()
        run: node scripts/generate-report-pdf.js
      - name: Publicar relatório HTML e PDF
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-api
          path: cypress/reports
          if-no-files-found: ignore

  frontend-tests:
    name: Testes E2E de Frontend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Executar testes E2E
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/frontend/**/*.cy.js
          browser: chrome
      - name: Gerar evidência em PDF do relatório
        if: always()
        run: node scripts/generate-report-pdf.js
      - name: Publicar relatório HTML e PDF
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-frontend
          path: cypress/reports
          if-no-files-found: ignore
      - name: Publicar screenshots em caso de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
